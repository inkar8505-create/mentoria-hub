<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentoria Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Mentoria Hub 🚀</h1>

<p>Find opportunities for your future.</p>

<input type="text" id="name" placeholder="Your name">

<input type="number" id="age" placeholder="Your age">

<input type="text" id="country" placeholder="Your country">

<input type="text" id="goal" placeholder="Dream university (MIT, Yale...)">

<select id="interest">
    <option value="">Choose your interest</option>
    <option value="English">English</option>
    <option value="STEM">STEM</option>
    <option value="Business">Business</option>
</select>

<br><br>

<button onclick="start()">Start</button>

<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
